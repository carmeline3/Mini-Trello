<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/download (1).jpeg">
</head>
<body>

<div class="all">

    <h1>Mini Trello</h1>

    <div class="top-bar">

        <input type="text"  id="taskInput"  placeholder="Enter task">

        <select id="labelInput">
            <option>Studies</option>
            <option>Client Work</option>
            <option>Church Work</option>
            <option>Personal work</option>
        </select>
</div>
       <br> 
       <button onclick="addTask()" class="add"> Add Task</button>

    </div>
    


    <div class="board">

        <div class="column">
            <h2>To Do</h2>
            <div id="todo"></div>
        </div> 

        <div class="column">
            <h2>Doing</h2>
            <div id="doing"></div>
        </div>

        <div class="column">
            <h2>Done</h2>
            <div id="done"></div>
        </div>

    </div>

    <script src="index.js"></script>

</body>
</html>
